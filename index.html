<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEO Meta Tags -->
    <title>Knowledge Card – Your Personal Knowledge Hub</title>
    <meta name="description" content="Explore, organize, and share knowledge cards effortlessly. A modern web app for knowledge management with sleek UI and powerful features." />
    <meta name="keywords" content="knowledge, knowledge card, knowledge management, personal knowledge base, notes, web app" />
    <meta name="author" content="Nishu" />
    <link rel="canonical" href="https://example.com/" />
    <!-- Open Graph -->
    <meta property="og:title" content="Knowledge Card – Your Personal Knowledge Hub" />
    <meta property="og:description" content="Explore, organize, and share knowledge cards effortlessly. A modern web app for knowledge management with sleek UI and powerful features." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:image" content="https://example.com/og-image.jpg" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Knowledge Card – Your Personal Knowledge Hub" />
    <meta name="twitter:description" content="Explore, organize, and share knowledge cards effortlessly. A modern web app for knowledge management with sleek UI and powerful features." />
    <meta name="twitter:image" content="https://example.com/twitter-image.jpg" />
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Knowledge Card",
      "url": "https://example.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://example.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <!-- End SEO Tags -->
    <!-- Styles (optional) -->
    <link rel="stylesheet" href="/styles/main.css" />
    <!-- Fallback for older browsers -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
